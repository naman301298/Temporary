<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Login</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: "Segoe UI", sans-serif;
}

body{
height:100vh;
display:flex;
}

/* LEFT SIDE */

.left{
flex:1;
background:linear-gradient(135deg,#4f46e5,#9333ea);
color:white;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:40px;
text-align:center;
}

.left h1{
font-size:40px;
margin-bottom:20px;
}

.left p{
font-size:16px;
max-width:350px;
opacity:0.9;
line-height:1.6;
}

/* RIGHT SIDE */

.right{
flex:1;
display:flex;
justify-content:center;
align-items:center;
background:#f5f6fa;
}

.login-card{
width:380px;
background:white;
padding:45px;
border-radius:15px;
box-shadow:0 20px 40px rgba(0,0,0,0.1);
}

.login-card h2{
margin-bottom:25px;
color:#333;
}

/* INPUT */

.input-box{
position:relative;
margin-bottom:20px;
}

.input-box input{
width:100%;
padding:14px 40px;
border:1px solid #ddd;
border-radius:8px;
outline:none;
font-size:14px;
transition:0.3s;
}

.input-box input:focus{
border-color:#6366f1;
box-shadow:0 0 8px rgba(99,102,241,0.2);
}

.input-box i{
position:absolute;
left:12px;
top:50%;
transform:translateY(-50%);
color:#777;
}

/* OPTIONS */

.options{
display:flex;
justify-content:space-between;
font-size:14px;
margin-bottom:20px;
}

.options a{
text-decoration:none;
color:#6366f1;
}

/* BUTTON */

button{
width:100%;
padding:14px;
border:none;
border-radius:8px;
background:#6366f1;
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#4f46e5;
}

/* DIVIDER */

.divider{
text-align:center;
margin:20px 0;
color:#aaa;
font-size:13px;
}

/* SOCIAL LOGIN */

.social{
display:flex;
gap:10px;
}

.social button{
flex:1;
background:white;
border:1px solid #ddd;
color:#333;
}

.social button:hover{
background:#f2f2f2;
}

/* SIGNUP */

.signup{
margin-top:20px;
font-size:14px;
text-align:center;
}

.signup a{
color:#6366f1;
text-decoration:none;
font-weight:600;
}

</style>
</head>

<body>

<div class="left">

<h1>Welcome Back</h1>
<p>
Login to access your dashboard, manage your account,
and explore amazing features.
</p>

</div>


<div class="right">

<div class="login-card">

<h2>Sign In</h2>

<form>

<div class="input-box">
<i class="fa fa-envelope"></i>
<input type="text" placeholder="Email">
</div>

<div class="input-box">
<i class="fa fa-lock"></i>
<input type="password" placeholder="Password">
</div>

<div class="options">
<label><input type="checkbox"> Remember me</label>
<a href="#">Forgot password?</a>
</div>

<button>Login</button>

<div class="divider">or continue with</div>

<div class="social">
<button><i class="fab fa-google"></i> Google</button>
<button><i class="fab fa-github"></i> Github</button>
</div>

<div class="signup">
Don't have an account? <a href="#">Sign up</a>
</div>

</form>

</div>

</div>

</body>
</html>
