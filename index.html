<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In</title>
<link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page" data-page="login">
    <div class="page-shell">
        <section class="auth-card">
            <p class="brand-kicker">Local Access Portal</p>
            <h1 class="page-title">Welcome back</h1>
            <p class="page-copy">Sign in with your username or email to open the dashboard.</p>

            <div id="loginMessage" class="form-message" aria-live="polite"></div>

            <form id="loginForm" class="auth-form" novalidate>
                <label class="field">
                    <span>Email or Username</span>
                    <input id="loginIdentifier" class="input" type="text" placeholder="jane@example.com" autocomplete="username" required>
                </label>

                <label class="field">
                    <span>Password</span>
                    <input id="loginPassword" class="input" type="password" placeholder="Enter your password" autocomplete="current-password" required>
                </label>

                <div class="form-row">
                    <label class="checkbox-row">
                        <input id="rememberMe" type="checkbox">
                        <span>Remember me</span>
                    </label>

                    <a id="forgotPasswordLink" class="text-link" href="#">Forgot password?</a>
                </div>

                <button class="btn btn-primary" type="submit">Login</button>
            </form>

            <p class="footer-copy">
                No account yet?
                <a class="text-link" href="registration.html">Create one</a>
            </p>
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>
